<!-- Módulo: Ciclo Económico -->
<style>
  .bc-label  { fill: #374151; }
  .bc-muted  { fill: #6b7280; }
  .bc-curve  { stroke: #1e40af; }
  .bc-dot    { fill: #1e40af; }
  [data-bs-theme="dark"] .bc-label { fill: #e5e7eb; }
  [data-bs-theme="dark"] .bc-muted { fill: #9ca3af; }
  [data-bs-theme="dark"] .bc-curve { stroke: #60a5fa; }
  [data-bs-theme="dark"] .bc-dot   { fill: #60a5fa; }
</style>

<div class="card shadow-sm mb-4" id="business-cycle-card">
  <div class="card-header d-flex align-items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
      <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/>
      <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/>
    </svg>
    <strong>Ciclo Económico</strong>
    <span id="bc-phase-badge" class="badge ms-auto" style="display:none;"></span>
  </div>

  <div class="card-body">

    <div id="bc-loading" class="text-center py-4">
      <div class="spinner-border spinner-border-sm text-secondary me-2" role="status"></div>
      <span class="text-muted small">Analizando indicadores macro y rotación sectorial…</span>
    </div>

    <div id="bc-error" class="alert alert-warning small" style="display:none;"></div>

    <div id="bc-content" style="display:none;">

      <!-- ── Curva del ciclo económico ── -->
      <div style="overflow-x:auto;">
        <svg viewBox="0 0 1000 310" xmlns="http://www.w3.org/2000/svg"
             style="width:100%;min-width:640px;display:block;">

          <!-- Fondos de fase (muy sutil) -->
          <rect x="30"  y="46" width="235" height="224" fill="#22c55e" fill-opacity="0.06"/>
          <rect x="265" y="46" width="235" height="224" fill="#84cc16" fill-opacity="0.06"/>
          <rect x="500" y="46" width="235" height="224" fill="#f97316" fill-opacity="0.06"/>
          <rect x="735" y="46" width="235" height="224" fill="#ef4444" fill-opacity="0.06"/>

          <!-- Línea de crecimiento tendencial (horizontal, punteada) -->
          <line x1="30" y1="165" x2="970" y2="165"
                stroke="#9ca3af" stroke-width="1" stroke-dasharray="6 4"/>

          <!-- La curva del ciclo (una sola arch: expansión sube, contracción baja) -->
          <!--
            Fórmula: y = 265 - 210*sin(π*t), t ∈ [0,1], x = 30 + 940*t
            Bezier que aproxima esa arch:
          -->
          <path class="bc-curve"
                d="M30,265 C220,265 280,55 500,55 C720,55 780,265 970,265"
                fill="none" stroke-width="2.5" stroke-linecap="round"/>

          <!-- Separadores de fase (verticales, punteados) -->
          <line x1="265" y1="46" x2="265" y2="270" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3"/>
          <line x1="500" y1="46" x2="500" y2="270" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3"/>
          <line x1="735" y1="46" x2="735" y2="270" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3"/>

          <!--
            Puntos de sectores sobre la curva.
            Posiciones calculadas con y = 265 - 210*sin(π*t):
            XLK  t=0.10  x=124  y=200
            XLY  t=0.20  x=218  y=142
            XLI  t=0.30  x=312  y=96
            XLB  t=0.40  x=406  y=65
            XLE  t=0.50  x=500  y=55  (pico)
            XLP  t=0.57  x=566  y=60
            XLV  t=0.65  x=641  y=77
            XLU  t=0.75  x=735  y=118
            XLF  t=0.83  x=810  y=155
            IYZ  t=0.90  x=876  y=200
          -->
          <circle class="bc-dot" cx="124" cy="200" r="4"/>
          <circle class="bc-dot" cx="218" cy="142" r="4"/>
          <circle class="bc-dot" cx="312" cy="96"  r="4"/>
          <circle class="bc-dot" cx="406" cy="65"  r="4"/>
          <circle class="bc-dot" cx="500" cy="55"  r="4"/>
          <circle class="bc-dot" cx="566" cy="60"  r="4"/>
          <circle class="bc-dot" cx="641" cy="77"  r="4"/>
          <circle class="bc-dot" cx="735" cy="118" r="4"/>
          <circle class="bc-dot" cx="810" cy="155" r="4"/>
          <circle class="bc-dot" cx="876" cy="200" r="4"/>

          <!-- Etiquetas de sectores -->
          <text class="bc-label" x="137" y="196"  font-size="9.5" font-family="sans-serif">TECHNOLOGY</text>
          <text class="bc-label" font-size="9.5" font-family="sans-serif">
            <tspan x="231" y="145">CONSUMER</tspan>
            <tspan x="231" dy="11">DISCR.</tspan>
          </text>
          <text class="bc-label" x="325" y="92"   font-size="9.5" font-family="sans-serif">INDUSTRIALS</text>
          <text class="bc-label" x="419" y="62"   font-size="9.5" font-family="sans-serif">MATERIALS</text>
          <text class="bc-label" x="513" y="51"   font-size="9.5" font-family="sans-serif">ENERGY</text>
          <text class="bc-label" font-size="9.5" font-family="sans-serif">
            <tspan x="509" y="76">CONSUMER</tspan>
            <tspan x="509" dy="11">STAPLES</tspan>
          </text>
          <text class="bc-label" font-size="9.5" font-family="sans-serif">
            <tspan x="654" y="74">HEALTH</tspan>
            <tspan x="654" dy="11">CARE</tspan>
          </text>
          <text class="bc-label" x="748" y="114"  font-size="9.5" font-family="sans-serif">UTILITIES</text>
          <text class="bc-label" x="823" y="151"  font-size="9.5" font-family="sans-serif">FINANCIALS</text>
          <text class="bc-label" x="889" y="200"  font-size="9.5" font-family="sans-serif">TELECOM</text>

          <!-- Marcador: posición actual (movido por JS desde position_pct) -->
          <circle id="bc-marker-outer" cx="500" cy="55" r="9" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5">
            <animate attributeName="r"       values="7;13;7"    dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle id="bc-marker" cx="500" cy="55" r="5.5" fill="#22c55e" stroke="white" stroke-width="2"/>

          <!-- Etiquetas de fase (abajo) -->
          <text class="bc-muted" x="147" y="292" text-anchor="middle" font-size="10"
                font-weight="700" font-family="sans-serif" fill="#22c55e">EARLY EXPANSION</text>
          <text class="bc-muted" x="382" y="292" text-anchor="middle" font-size="10"
                font-weight="700" font-family="sans-serif" fill="#84cc16">LATE EXPANSION</text>
          <text class="bc-muted" x="617" y="292" text-anchor="middle" font-size="10"
                font-weight="700" font-family="sans-serif" fill="#f97316">EARLY CONTRACTION</text>
          <text class="bc-muted" x="852" y="292" text-anchor="middle" font-size="10"
                font-weight="700" font-family="sans-serif" fill="#ef4444">LATE CONTRACTION</text>

        </svg>
      </div>

      <!-- ── Fila de detalle ── -->
      <div class="row g-3 mt-1">

        <!-- Descripción de la fase + sectores favorables -->
        <div class="col-md-5">
          <div id="bc-phase-desc" class="p-3 rounded-3 mb-3"
               style="border-left:4px solid #22c55e;background:rgba(34,197,94,.06)">
            <div class="fw-semibold mb-1" id="bc-phase-title"></div>
            <div class="small text-muted" id="bc-phase-explanation"></div>
          </div>
          <p class="small fw-semibold text-muted text-uppercase mb-2" style="letter-spacing:.05em">
            Sectores favorables
          </p>
          <div id="bc-favorable" class="d-flex flex-wrap gap-2"></div>
        </div>

        <!-- Indicadores macro -->
        <div class="col-md-3">
          <p class="small fw-semibold text-muted text-uppercase mb-2" style="letter-spacing:.05em">
            Indicadores Macro
          </p>
          <table class="table table-sm table-borderless mb-0" id="bc-macro-table">
            <tbody></tbody>
          </table>
        </div>

        <!-- Rotación sectorial -->
        <div class="col-md-4">
          <p class="small fw-semibold text-muted text-uppercase mb-2" style="letter-spacing:.05em">
            Rotación vs SPY (90 días)
          </p>
          <table class="table table-sm table-borderless mb-0" id="bc-sector-table">
            <tbody></tbody>
          </table>
        </div>

      </div>

      <!-- Footer -->
      <div class="mt-3 pt-2 border-top d-flex align-items-center gap-3 flex-wrap">
        <span class="small text-muted">Confianza: <strong id="bc-confidence"></strong></span>
        <span class="small text-muted">Score combinado: <strong id="bc-score"></strong></span>
        <span class="ms-auto small text-muted fst-italic">Macro 60% · Sectorial 40% · Caché 10 min</span>
      </div>

    </div><!-- /bc-content -->
  </div><!-- /card-body -->
</div>

<script>
(function () {

  var PHASE_EXPLANATIONS = {
    'early_expansion':   'La economía sale de una recesión. El desempleo cae y los activos de riesgo suben con fuerza. Tecnología y consumo discrecional lideran.',
    'late_expansion':    'El crecimiento continúa pero desacelera. La inflación sube y los bancos centrales ajustan tasas. Industriales, materiales y energía se benefician.',
    'early_contraction': 'El crecimiento se frena. Las tasas suelen estar en máximos. Energía y consumo básico son más resistentes.',
    'late_contraction':  'Recesión. Los activos de riesgo caen. Utilities, salud y bonos suelen superar al mercado.',
  };

  var PHASE_COLORS = {
    'early_expansion':   '#22c55e',
    'late_expansion':    '#84cc16',
    'early_contraction': '#f97316',
    'late_contraction':  '#ef4444',
  };

  // Coordenadas del marcador: x = 30 + 940*t, y = 265 - 210*sin(π*t)
  function markerCoords(positionPct) {
    var t = Math.max(0, Math.min(1, positionPct));
    var x = 30 + 940 * t;
    var y = 265 - 210 * Math.sin(Math.PI * t);
    return { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
  }

  function scoreArrow(s) {
    if (s > 0.5)  return '▲';
    if (s < -0.5) return '▼';
    return '→';
  }
  function scoreColor(s) {
    if (s >= 1.0)  return 'text-success';
    if (s <= -1.0) return 'text-danger';
    if (s < 0)     return 'text-warning';
    return 'text-secondary';
  }
  function relColor(v) {
    if (v > 1.5)  return 'text-success';
    if (v < -1.5) return 'text-danger';
    return 'text-secondary';
  }

  fetch('/api/business-cycle/')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.error) throw new Error(d.error);

      var phase = d.phase;
      var color = PHASE_COLORS[phase] || '#6b7280';

      // Badge en el header
      var badge = document.getElementById('bc-phase-badge');
      badge.textContent = d.phase_label;
      badge.style.background = color;
      badge.style.color = '#fff';
      badge.style.display = '';

      // Mover marcador sobre la curva
      var coords = markerCoords(d.position_pct || 0.5);
      var marker = document.getElementById('bc-marker');
      var outer  = document.getElementById('bc-marker-outer');
      if (marker) {
        marker.setAttribute('cx', coords.x);
        marker.setAttribute('cy', coords.y);
        marker.setAttribute('fill', color);
      }
      if (outer) {
        outer.setAttribute('cx', coords.x);
        outer.setAttribute('cy', coords.y);
        outer.setAttribute('stroke', color);
      }

      // Descripción de la fase
      var desc = document.getElementById('bc-phase-desc');
      desc.style.borderLeftColor = color;
      desc.style.background = color + '0f';
      document.getElementById('bc-phase-title').textContent = d.phase_label;
      document.getElementById('bc-phase-explanation').textContent =
        PHASE_EXPLANATIONS[phase] || '';

      // Sectores favorables
      var favDiv = document.getElementById('bc-favorable');
      (d.favorable_sectors || []).forEach(function (f) {
        var span = document.createElement('span');
        span.className = 'badge rounded-pill';
        span.style.cssText = 'background:' + color + '1a;color:' + color +
                             ';border:1px solid ' + color + '55;';
        span.textContent = f.ticker + ' · ' + f.nombre;
        favDiv.appendChild(span);
      });

      // Indicadores macro
      var macroBody = document.querySelector('#bc-macro-table tbody');
      (d.macro_signals || []).forEach(function (sig) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="py-1 small text-muted">' + sig.nombre + '</td>' +
          '<td class="py-1 small text-end fw-medium">' + sig.valor + '</td>' +
          '<td class="py-1 small text-end ' + scoreColor(sig.score) + '">' +
            scoreArrow(sig.score) + '</td>';
        macroBody.appendChild(tr);
      });

      // Rotación sectorial (ordenada de mejor a peor)
      var sectorBody = document.querySelector('#bc-sector-table tbody');
      var sorted = (d.sector_results || []).slice().sort(function (a, b) {
        return b.retorno_rel - a.retorno_rel;
      });
      sorted.forEach(function (s) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="py-1 small"><strong>' + s.ticker + '</strong>' +
            ' <span class="text-muted">' + s.nombre + '</span></td>' +
          '<td class="py-1 small text-end ' + relColor(s.retorno_rel) + '">' +
            (s.retorno_rel >= 0 ? '+' : '') + s.retorno_rel.toFixed(1) + '%</td>';
        sectorBody.appendChild(tr);
      });

      // Score y confianza
      document.getElementById('bc-confidence').textContent = d.confidence;
      document.getElementById('bc-score').textContent = d.score;

      // Mostrar contenido
      document.getElementById('bc-loading').style.display = 'none';
      document.getElementById('bc-content').style.display = '';
    })
    .catch(function (err) {
      document.getElementById('bc-loading').style.display = 'none';
      var errEl = document.getElementById('bc-error');
      errEl.textContent = 'No se pudo cargar el ciclo económico: ' + err.message;
      errEl.style.display = '';
    });
})();
</script>
