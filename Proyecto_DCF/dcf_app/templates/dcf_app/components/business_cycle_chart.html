<!-- Módulo: Ciclo Económico -->
<div class="card shadow-sm mb-4" id="business-cycle-card">
  <div class="card-header d-flex align-items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
      <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/>
      <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/>
    </svg>
    <strong>Ciclo Económico</strong>
    <span id="bc-phase-badge" class="badge ms-auto" style="display:none;"></span>
  </div>

  <div class="card-body">

    <!-- Spinner mientras carga -->
    <div id="bc-loading" class="text-center py-4">
      <div class="spinner-border spinner-border-sm text-secondary me-2" role="status"></div>
      <span class="text-muted small">Analizando indicadores macro y rotación sectorial…</span>
    </div>

    <!-- Error -->
    <div id="bc-error" class="alert alert-warning small" style="display:none;"></div>

    <!-- Contenido cargado -->
    <div id="bc-content" style="display:none;">

      <div class="row g-4 align-items-start">

        <!-- ── Reloj de ciclo (SVG) ── -->
        <div class="col-md-5 text-center">
          <svg id="bc-clock" viewBox="0 0 400 430"
               xmlns="http://www.w3.org/2000/svg"
               style="width:100%;max-width:340px;display:block;margin:auto;">

            <!-- ── Cuadrantes ── -->
            <!-- Superior-izquierdo: Expansión Temprana (verde) -->
            <path d="M200,210 L50,210 A150,150 0 0 1 200,60 Z"
                  fill="#22c55e" fill-opacity="0.18"/>
            <!-- Superior-derecho: Expansión Tardía (verde-amarillo) -->
            <path d="M200,210 L200,60 A150,150 0 0 1 350,210 Z"
                  fill="#84cc16" fill-opacity="0.18"/>
            <!-- Inferior-derecho: Contracción Temprana (naranja) -->
            <path d="M200,210 L350,210 A150,150 0 0 1 200,360 Z"
                  fill="#f97316" fill-opacity="0.18"/>
            <!-- Inferior-izquierdo: Contracción Tardía (rojo) -->
            <path d="M200,210 L200,360 A150,150 0 0 1 50,210 Z"
                  fill="#ef4444" fill-opacity="0.18"/>

            <!-- ── Borde exterior del círculo ── -->
            <circle cx="200" cy="210" r="150" fill="none" stroke="#d1d5db" stroke-width="1.5"/>

            <!-- ── Ejes cruzados ── -->
            <line x1="50" y1="210" x2="350" y2="210" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3"/>
            <line x1="200" y1="60"  x2="200" y2="360" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4 3"/>

            <!-- ── Etiquetas de fase (fuera del círculo) ── -->
            <text x="95"  y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">Expansión</text>
            <text x="95"  y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">Temprana</text>
            <text x="305" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#84cc16">Expansión</text>
            <text x="305" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#84cc16">Tardía</text>
            <text x="305" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#f97316">Contracción</text>
            <text x="305" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#f97316">Temprana</text>
            <text x="95"  y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">Contracción</text>
            <text x="95"  y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">Tardía</text>

            <!-- ── Sectores dentro de cada cuadrante ── -->
            <text x="145" y="175" text-anchor="middle" font-size="9" fill="#6b7280">XLK · XLY</text>
            <text x="255" y="175" text-anchor="middle" font-size="9" fill="#6b7280">XLI · XLB · XLV</text>
            <text x="255" y="250" text-anchor="middle" font-size="9" fill="#6b7280">XLE · XLP</text>
            <text x="145" y="250" text-anchor="middle" font-size="9" fill="#6b7280">XLU · XLF · IYZ</text>

            <!-- ── Flecha de dirección (ciclo va en sentido horario) ── -->
            <path d="M 200,58 A 152,152 0 0 1 352,210" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrowhead)"/>
            <defs>
              <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                <polygon points="0 0, 6 3, 0 6" fill="#9ca3af"/>
              </marker>
            </defs>

            <!-- ── Aguja ── -->
            <!-- Dibujada apuntando hacia arriba; JS la rota -->
            <g id="bc-needle" transform="rotate(0, 200, 210)">
              <!-- Sombra de la aguja -->
              <line x1="200" y1="210" x2="200" y2="80"
                    stroke="#00000022" stroke-width="5" stroke-linecap="round"/>
              <!-- Cuerpo de la aguja -->
              <line id="bc-needle-line" x1="200" y1="210" x2="200" y2="80"
                    stroke="#1f2937" stroke-width="3.5" stroke-linecap="round"/>
              <!-- Punta -->
              <polygon points="200,68 194,86 206,86" fill="#1f2937"/>
            </g>

            <!-- ── Punto pulsante en la punta de la aguja ── -->
            <circle id="bc-tip-pulse" cx="200" cy="68" r="6" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6">
              <animate attributeName="r"       values="5;11;5"   dur="2s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
            </circle>
            <circle id="bc-tip-dot" cx="200" cy="68" r="4" fill="#22c55e"/>

            <!-- ── Centro (círculo interno, efecto donut) ── -->
            <circle cx="200" cy="210" r="52" fill="white" id="bc-inner-circle"/>
            <circle cx="200" cy="210" r="8" fill="#374151"/>

            <!-- ── Eje: arriba = creciendo, abajo = contrayendo ── -->
            <text x="200" y="42"  text-anchor="middle" font-size="9.5" fill="#6b7280">↑ Economía creciendo</text>
            <text x="200" y="382" text-anchor="middle" font-size="9.5" fill="#6b7280">↓ Economía contrayendo</text>

          </svg>
        </div>

        <!-- ── Panel derecho ── -->
        <div class="col-md-7">

          <!-- Descripción de la fase -->
          <div id="bc-phase-desc" class="p-3 rounded-3 mb-3" style="border-left: 4px solid #22c55e; background: rgba(34,197,94,0.06);">
            <div class="fw-bold mb-1" id="bc-phase-title"></div>
            <div class="small text-muted" id="bc-phase-explanation"></div>
          </div>

          <!-- Indicadores macro -->
          <p class="small fw-semibold text-muted text-uppercase mb-2" style="letter-spacing:.05em;">
            Indicadores Macro (FRED)
          </p>
          <table class="table table-sm table-borderless mb-3" id="bc-macro-table">
            <tbody></tbody>
          </table>

          <!-- Sectores favorables -->
          <p class="small fw-semibold text-muted text-uppercase mb-2" style="letter-spacing:.05em;">
            Sectores favorables en esta fase
          </p>
          <div id="bc-favorable" class="d-flex flex-wrap gap-2 mb-3"></div>

          <!-- Rotación sectorial -->
          <p class="small fw-semibold text-muted text-uppercase mb-2" style="letter-spacing:.05em;">
            Rotación Sectorial — 90 días vs SPY
          </p>
          <table class="table table-sm table-borderless mb-0" id="bc-sector-table">
            <tbody></tbody>
          </table>

        </div>
      </div><!-- /row -->

      <!-- Footer -->
      <div class="mt-3 pt-2 border-top d-flex align-items-center gap-3 flex-wrap">
        <span class="small text-muted">Confianza: <strong id="bc-confidence"></strong></span>
        <span class="small text-muted">Score: <strong id="bc-score"></strong></span>
        <span class="ms-auto small text-muted fst-italic">Macro 60% · Sectorial 40% · Caché 10 min</span>
      </div>

    </div><!-- /bc-content -->
  </div><!-- /card-body -->
</div><!-- /card -->

<script>
(function () {

  // Ángulo de rotación de la aguja según fase (el SVG la dibuja apuntando arriba = 0°)
  var NEEDLE_ANGLE = {
    'early_expansion':   -45,   // noroeste
    'late_expansion':     45,   // noreste
    'early_contraction':  135,  // sureste
    'late_contraction':  -135,  // suroeste
  };

  // Coordenadas de la punta de la aguja según fase (r=142 desde centro 200,210)
  var TIP_COORDS = {
    'early_expansion':   { x: 100, y: 110 },
    'late_expansion':    { x: 300, y: 110 },
    'early_contraction': { x: 300, y: 310 },
    'late_contraction':  { x: 100, y: 310 },
  };

  var PHASE_EXPLANATIONS = {
    'early_expansion':   'La economía sale de una recesión. El desempleo cae, los créditos se reactivan y los activos de riesgo suelen subir con fuerza. Tecnología y consumo discrecional lideran.',
    'late_expansion':    'El crecimiento continúa pero empieza a desacelerarse. La inflación puede subir y los bancos centrales comienzan a ajustar tasas. Industriales y materias primas se benefician.',
    'early_contraction': 'El crecimiento se frena notablemente. Los bancos centrales suelen estar en modo restrictivo. Energía y consumo básico son más resistentes.',
    'late_contraction':  'Recesión. Los activos de riesgo caen con fuerza. Bonos y sectores defensivos como utilities y salud suelen superar al mercado.',
  };

  var PHASE_COLORS = {
    'early_expansion':   '#22c55e',
    'late_expansion':    '#84cc16',
    'early_contraction': '#f97316',
    'late_contraction':  '#ef4444',
  };

  function scoreArrow(s) {
    if (s > 0.5)  return '▲';
    if (s < -0.5) return '▼';
    return '→';
  }

  function scoreColor(s) {
    if (s >= 1.0)  return 'text-success';
    if (s <= -1.0) return 'text-danger';
    if (s < 0)     return 'text-warning';
    return 'text-secondary';
  }

  function relColor(v) {
    if (v > 1.5)  return 'text-success';
    if (v < -1.5) return 'text-danger';
    return 'text-secondary';
  }

  // Detectar modo oscuro para ajustar círculo interior
  function isDarkMode() {
    return document.documentElement.getAttribute('data-bs-theme') === 'dark'
        || document.body.classList.contains('theme-dark');
  }

  fetch('/api/business-cycle/')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.error) throw new Error(d.error);

      var phase  = d.phase;
      var color  = PHASE_COLORS[phase] || d.color || '#6b7280';
      var angle  = NEEDLE_ANGLE[phase]  !== undefined ? NEEDLE_ANGLE[phase]  : 0;
      var tip    = TIP_COORDS[phase]    || { x: 200, y: 68 };

      // ── Badge ──
      var badge = document.getElementById('bc-phase-badge');
      badge.textContent  = d.phase_label;
      badge.style.background = color;
      badge.style.color  = '#fff';
      badge.style.display = '';

      // ── Aguja ──
      var needle = document.getElementById('bc-needle');
      if (needle) {
        needle.setAttribute('transform', 'rotate(' + angle + ', 200, 210)');
      }

      // ── Punta pulsante ──
      var tipPulse = document.getElementById('bc-tip-pulse');
      var tipDot   = document.getElementById('bc-tip-dot');
      if (tipPulse && tipDot) {
        tipPulse.setAttribute('cx', tip.x);
        tipPulse.setAttribute('cy', tip.y);
        tipPulse.setAttribute('stroke', color);
        tipDot.setAttribute('cx', tip.x);
        tipDot.setAttribute('cy', tip.y);
        tipDot.setAttribute('fill', color);
      }

      // ── Círculo interior (dark mode) ──
      var innerCircle = document.getElementById('bc-inner-circle');
      if (innerCircle && isDarkMode()) {
        innerCircle.setAttribute('fill', '#1e293b');
      }

      // ── Borde de descripción de fase ──
      var desc = document.getElementById('bc-phase-desc');
      desc.style.borderLeftColor = color;
      desc.style.background = color + '0f';
      document.getElementById('bc-phase-title').textContent = d.phase_label;
      document.getElementById('bc-phase-explanation').textContent =
        PHASE_EXPLANATIONS[phase] || '';

      // ── Indicadores macro ──
      var macroTbody = document.querySelector('#bc-macro-table tbody');
      (d.macro_signals || []).forEach(function (sig) {
        var row = document.createElement('tr');
        row.innerHTML =
          '<td class="py-1 small text-muted">' + sig.nombre + '</td>' +
          '<td class="py-1 small text-end fw-medium">' + sig.valor + '</td>' +
          '<td class="py-1 small text-end ' + scoreColor(sig.score) + '">' +
            scoreArrow(sig.score) + '</td>';
        macroTbody.appendChild(row);
      });

      // ── Sectores favorables ──
      var favDiv = document.getElementById('bc-favorable');
      (d.favorable_sectors || []).forEach(function (f) {
        var span = document.createElement('span');
        span.className = 'badge rounded-pill';
        span.style.background = color + '22';
        span.style.color = color;
        span.style.border = '1px solid ' + color + '55';
        span.textContent = f.ticker + ' · ' + f.nombre;
        favDiv.appendChild(span);
      });

      // ── Rotación sectorial ──
      var sectorTbody = document.querySelector('#bc-sector-table tbody');
      var sorted = (d.sector_results || []).slice().sort(function(a,b){
        return b.retorno_rel - a.retorno_rel;
      });
      sorted.forEach(function (s) {
        var row = document.createElement('tr');
        row.innerHTML =
          '<td class="py-1 small"><strong>' + s.ticker + '</strong>' +
            ' <span class="text-muted">' + s.nombre + '</span></td>' +
          '<td class="py-1 small text-end ' + relColor(s.retorno_rel) + '">' +
            (s.retorno_rel >= 0 ? '+' : '') + s.retorno_rel.toFixed(1) + '%</td>' +
          '<td class="py-1 small text-muted text-end" style="font-size:0.78rem;">' + s.fase + '</td>';
        sectorTbody.appendChild(row);
      });

      // ── Score y confianza ──
      document.getElementById('bc-confidence').textContent = d.confidence;
      document.getElementById('bc-score').textContent = d.score;

      // ── Mostrar ──
      document.getElementById('bc-loading').style.display = 'none';
      document.getElementById('bc-content').style.display = '';
    })
    .catch(function (err) {
      document.getElementById('bc-loading').style.display = 'none';
      var errEl = document.getElementById('bc-error');
      errEl.textContent = 'No se pudo cargar el ciclo económico: ' + err.message;
      errEl.style.display = '';
    });
})();
</script>
